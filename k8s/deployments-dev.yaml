apiVersion: apps/v1
kind: Deployment
metadata:
  name: sindico-app
  namespace: apps-dev
spec:
  replicas: 1
  minReadySeconds: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sindico-app
  template:
    metadata:
      labels:
        app: sindico-app
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: sindico-app
          image: registry.oregon.net.br/celsonery/sindico-app:develop
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              memory: "12Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "1000m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sindico-app
  namespace: apps-dev
spec:
  selector:
    app: sindico-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30504
  type: NodePort
